name: 每日水利日报更新

on:
  schedule:
    # 北京时间 00:00 = UTC 前一天 16:00
    - cron: '0 16 * * *'
  workflow_dispatch:   # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. 检出代码 ────────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 2. Python 环境 ──────────────────────────────
      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml

      # ── 3. 运行爬虫 ─────────────────────────────────
      - name: 运行爬虫
        run: python crawler.py
        env:
          TZ: Asia/Shanghai
          PYTHONIOENCODING: utf-8

      # ── 4. 校验生成数据 ─────────────────────────────
      - name: 校验 JSON 数据
        run: |
          python - << 'PYEOF'
          import json

          def validate_report(data):
              required = ['date', 'news_date', 'update_time', 'total_news', 'category_count', 'news']
              return isinstance(data, dict) and all(key in data for key in required) and isinstance(data['news'], dict)

          with open('news-data.json', encoding='utf-8') as f:
              news_data = json.load(f)
          with open('archive-data.json', encoding='utf-8') as f:
              archive_data = json.load(f)

          if not validate_report(news_data):
              raise SystemExit('news-data.json 结构无效')
          if not isinstance(archive_data, list):
              raise SystemExit('archive-data.json 必须是数组')

          print(f"news-data.json 校验通过：{news_data['date']} / {news_data['total_news']} 条")
          print(f"archive-data.json 校验通过：{len(archive_data)} 期")
          PYEOF
        env:
          TZ: Asia/Shanghai

      # ── 5. 提交数据到仓库 ──────────────────────────
      - name: 提交数据更新
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-data.json archive-data.json
          if git diff --staged --quiet; then
            echo "无变更，跳过提交"
          else
            TODAY=$(TZ='Asia/Shanghai' date '+%Y年%m月%d日')
            git commit -m "📰 ${TODAY} 水利日报自动更新"
            git push
          fi

      # ── 6. 打包 & 部署到 GitHub Pages ──────────────
      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 打包网站文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
